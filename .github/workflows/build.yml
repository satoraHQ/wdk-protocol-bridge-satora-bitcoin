name: build

on:
  push:
    branches: [main]
  # Run on every pull request regardless of its base branch (so review PRs
  # against non-main bases also get lint + tests).
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Set up Node 22.22.0
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.0'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm clean-install

      - name: Lint code with standard
        run: npm run lint

      - name: Run tests
        run: npm test
